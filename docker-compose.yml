services:
  vodlink:
    # Local build (default). To use a pre-built image from GitHub Packages instead:
    #   comment out the 'build' block and uncomment the 'image' line below.
    # image: ghcr.io/jdfrey1/vodlink:latest
    build:
      context: .
      args:
        - VERSION=${VODLINK_VERSION:-dev}
    container_name: vodlink
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${VODLINK_PORT:-7842}:8000"
    volumes:
      # Source paths are mirrored exactly (host path == container path) so that
      # symlinks VodLink creates inside the container resolve on the host too.
      - ${MOVIES_SRC}:${MOVIES_SRC}:ro
      - ${SERIES_SRC}:${SERIES_SRC}:ro
      - ${MOVIES_DEST}:${MOVIES_DEST}:rw
      - ${SERIES_DEST}:${SERIES_DEST}:rw
      - ${DATA_DIR:-/volume1/docker/vodlink/data}:/app/data:rw
    environment:
      - MOVIES_SRC=${MOVIES_SRC}
      - SERIES_SRC=${SERIES_SRC}
      - MOVIES_DEST=${MOVIES_DEST}
      - SERIES_DEST=${SERIES_DEST}
      - DB_PATH=/app/data/vodlink.db
      - VODLINK_BASE_URL=${VODLINK_BASE_URL}
    restart: unless-stopped
