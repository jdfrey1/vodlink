events {
    worker_connections 1024;
}

http {
    # Dispatcharr returns text/html for actual video streams — map it to
    # application/octet-stream so Emby's player issues proper Range requests
    map $upstream_http_content_type $content_type_fixed {
        "text/html"                "application/octet-stream";
        "text/html; charset=utf-8" "application/octet-stream";
        default                    $upstream_http_content_type;
    }

    server {
        listen ${PROXY_PORT};

        location / {
            proxy_pass http://${DISPATCHARR_IP}:${DISPATCHARR_PORT};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # No buffering — video streams must not be held in proxy memory
            proxy_buffering off;
            proxy_request_buffering off;

            # Long timeouts for large files
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;

            # Fix wrong Content-Type from Dispatcharr
            proxy_hide_header Content-Type;
            add_header Content-Type $content_type_fixed always;
        }
    }
}
